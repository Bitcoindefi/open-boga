    <text x="64" y="-14" opacity="0.24"><tspan x="64" dy="26">1</tspan><tspan x="64" dy="22">ラ</tspan><tspan x="64" dy="22">4</tspan><tspan x="64" dy="22">ト</tspan><tspan x="64" dy="22">N</tspan><tspan x="64" dy="22">ク</tspan><tspan x="64" dy="22">2</tspan><tspan x="64" dy="22">ハ</tspan><tspan x="64" dy="22">0</tspan><tspan x="64" dy="22">ミ</tspan><tspan x="64" dy="22">6</tspan><tspan x="64" dy="22">サ</tspan><tspan x="64" dy="22">X</tspan><tspan x="64" dy="22">ル</tspan><tspan x="64" dy="22">7</tspan><tspan x="64" dy="22">タ</tspan></text>
    <text x="98" y="8" opacity="0.30"><tspan x="98" dy="26">ケ</tspan><tspan x="98" dy="22">0</tspan><tspan x="98" dy="22">ヨ</tspan><tspan x="98" dy="22">5</tspan><tspan x="98" dy="22">フ</tspan><tspan x="98" dy="22">R</tspan><tspan x="98" dy="22">3</tspan><tspan x="98" dy="22">ニ</tspan><tspan x="98" dy="22">8</tspan><tspan x="98" dy="22">セ</tspan><tspan x="98" dy="22">1</tspan><tspan x="98" dy="22">モ</tspan><tspan x="98" dy="22">4</tspan><tspan x="98" dy="22">ウ</tspan><tspan x="98" dy="22">9</tspan><tspan x="98" dy="22">コ</tspan></text>
    <text x="286" y="4" opacity="0.30"><tspan x="286" dy="26">3</tspan><tspan x="286" dy="22">キ</tspan><tspan x="286" dy="22">V</tspan><tspan x="286" dy="22">ユ</tspan><tspan x="286" dy="22">0</tspan><tspan x="286" dy="22">ホ</tspan><tspan x="286" dy="22">7</tspan><tspan x="286" dy="22">ア</tspan><tspan x="286" dy="22">2</tspan><tspan x="286" dy="22">ナ</tspan><tspan x="286" dy="22">9</tspan><tspan x="286" dy="22">エ</tspan><tspan x="286" dy="22">1</tspan><tspan x="286" dy="22">ス</tspan><tspan x="286" dy="22">6</tspan><tspan x="286" dy="22">リ</tspan></text>
    <text x="320" y="-10" opacity="0.24"><tspan x="320" dy="26">ノ</tspan><tspan x="320" dy="22">8</tspan><tspan x="320" dy="22">テ</tspan><tspan x="320" dy="22">1</tspan><tspan x="320" dy="22">M</tspan><tspan x="320" dy="22">レ</tspan><tspan x="320" dy="22">5</tspan><tspan x="320" dy="22">オ</tspan><tspan x="320" dy="22">0</tspan><tspan x="320" dy="22">チ</tspan><tspan x="320" dy="22">4</tspan><tspan x="320" dy="22">ム</tspan><tspan x="320" dy="22">7</tspan><tspan x="320" dy="22">イ</tspan><tspan x="320" dy="22">2</tspan><tspan x="320" dy="22">ヤ</tspan></text>
    <text x="354" y="12" opacity="0.36"><tspan x="354" dy="26">0</tspan><tspan x="354" dy="22">マ</tspan><tspan x="354" dy="22">6</tspan><tspan x="354" dy="22">ヌ</tspan><tspan x="354" dy="22">K</tspan><tspan x="354" dy="22">ロ</tspan><tspan x="354" dy="22">1</tspan><tspan x="354" dy="22">ツ</tspan><tspan x="354" dy="22">9</tspan><tspan x="354" dy="22">ヘ</tspan><tspan x="354" dy="22">3</tspan><tspan x="354" dy="22">ヲ</tspan><tspan x="354" dy="22">5</tspan><tspan x="354" dy="22">カ</tspan><tspan x="354" dy="22">8</tspan><tspan x="354" dy="22">シ</tspan></text>
    <text x="152" y="-6" opacity="0.12"><tspan x="152" dy="26">9</tspan><tspan x="152" dy="22">ミ</tspan><tspan x="152" dy="22">2</tspan><tspan x="152" dy="22">サ</tspan></text>
    <text x="242" y="2" opacity="0.12"><tspan x="242" dy="26">ハ</tspan><tspan x="242" dy="22">4</tspan><tspan x="242" dy="22">ネ</tspan></text>
