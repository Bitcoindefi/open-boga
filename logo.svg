    <path d="M246 172 c8 -2 12 6 8 14 c-3 6 -10 8 -14 4 Z" fill="#c9a077"/>
    <!-- pelo engominado hacia atrás -->
    <path d="M156 164 c-3 -34 16 -54 44 -54 c28 0 47 20 44 54 l-7 2 c2 -20 -4 -32 -15 -37 c-7 -3 -14 -5 -22 -5 c-8 0 -15 2 -22 5 c-11 5 -17 17 -15 37 Z" fill="#1b1512"/>
    <path d="M163 128 c10 -10 24 -14 37 -14 c13 0 27 4 37 14" fill="none" stroke="#3a2c22" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- anteojos -->
