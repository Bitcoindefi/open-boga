<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Agente Smith">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#04140b"/>
      <stop offset="1" stop-color="#020a06"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a3d23"/>
      <stop offset="0.5" stop-color="#00ff41" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#062916"/>
    </linearGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101815"/>
      <stop offset="1" stop-color="#060b08"/>
    </linearGradient>
    <linearGradient id="tie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1f14"/>
      <stop offset="1" stop-color="#041008"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#00ff41" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
