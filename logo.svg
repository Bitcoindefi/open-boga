    <circle cx="338" cy="355" r="2" fill="#9fb3a6"/>
    <circle cx="338" cy="361" r="2" fill="#9fb3a6"/>
    <circle cx="338" cy="367" r="2" fill="#9fb3a6"/>
    <circle cx="283" cy="358" r="3" fill="#cfe9d8" opacity="0.9"/>
