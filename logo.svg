      <rect x="204" y="166" width="31" height="19" rx="9" fill="#05080a"/>
      <rect x="168" y="169" width="25" height="13" rx="6" fill="url(#lens)"/>
      <rect x="207" y="169" width="25" height="13" rx="6" fill="url(#lens)"/>
      <rect x="195" y="172" width="10" height="4" rx="2" fill="#05080a"/>
      <path d="M165 174 l-9 -3 M235 174 l9 -3" stroke="#05080a" stroke-width="4" stroke-linecap="round"/>
      <path d="M172 170 h16" stroke="#b4ffce" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
      <path d="M211 170 h16" stroke="#b4ffce" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
    </g>
    <!-- nariz y gesto severo -->
    <path d="M199 192 c0 6 -1 9 -4 12 c3 3 7 3 10 0" fill="none" stroke="#b08a63" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M189 215 c8 3 15 3 22 0" fill="none" stroke="#8a6947" stroke-width="3" stroke-linecap="round"/>

    <!-- auricular con cable -->
    <circle cx="250" cy="180" r="5" fill="#0b0f0c" stroke="#00ff41" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M252 185 c10 22 2 44 -14 64 c-6 8 -8 16 -6 26" fill="none" stroke="#9fb3a6" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- escritorio del interrogatorio -->
