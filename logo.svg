      <rect x="162" y="164" width="34" height="25" rx="7" fill="#05080a"/>
      <rect x="204" y="164" width="34" height="25" rx="7" fill="#05080a"/>
      <rect x="165" y="167" width="28" height="19" rx="5" fill="url(#lens)"/>
      <rect x="207" y="167" width="28" height="19" rx="5" fill="url(#lens)"/>
      <rect x="196" y="171" width="8" height="4" rx="2" fill="#05080a"/>
      <path d="M162 172 l-8 -2 M238 172 l8 -2" stroke="#05080a" stroke-width="4" stroke-linecap="round"/>
      <!-- reflejo -->
      <path d="M169 170 l8 0 l-12 12 l0 -8 Z" fill="#b4ffce" opacity="0.35"/>
      <path d="M211 170 l8 0 l-12 12 l0 -8 Z" fill="#b4ffce" opacity="0.35"/>
    </g>
    <!-- nariz y gesto -->
    <path d="M199 192 c0 6 -1 9 -4 12 c3 3 7 3 10 0" fill="none" stroke="#b08a63" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M188 216 c8 4 18 4 24 -1" fill="none" stroke="#8a6947" stroke-width="3" stroke-linecap="round"/>

    <!-- auricular con cable -->
    <circle cx="250" cy="180" r="5" fill="#0b0f0c" stroke="#00ff41" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M252 185 c10 22 2 44 -14 64 c-6 8 -8 16 -6 26" fill="none" stroke="#9fb3a6" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
