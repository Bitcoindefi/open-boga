  </g>

  <!-- halo -->
  <ellipse cx="200" cy="190" rx="150" ry="150" fill="url(#glow)"/>

  <!-- ===== figura · capa de extrusión 2.5D ===== -->
  <g transform="translate(9,9)" fill="#001708">
    <path d="M200 112 c-30 0 -44 20 -44 50 c0 28 16 62 44 62 c28 0 44 -34 44 -62 c0 -30 -14 -50 -44 -50 Z"/>
    <path d="M92 400 c4 -74 40 -108 82 -122 l26 -8 l26 8 c42 14 78 48 82 122 Z"/>
  </g>

